<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PopX App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #f5f5f5; border-radius: 16px; width: 480px; min-height: 580px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  input[type="radio"] { accent-color: #6c35de; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function WelcomeScreen({ navigate }) {
  return (
    <div className="card flex flex-col justify-end p-8" style={{minHeight:'580px'}}>
      <div>
        <h1 className="text-3xl font-bold text-gray-900 mb-3">Welcome to PopX</h1>
        <p className="text-gray-500 text-sm mb-8 leading-relaxed">Lorem ipsum dolor sit amet,<br/>consectetur adipiscing elit.</p>
        <button
          onClick={() => navigate('create-account')}
          className="w-full py-4 rounded-lg text-white font-semibold text-base mb-3"
          style={{background:'#6c35de'}}
        >
          Create Account
        </button>
        <button
          onClick={() => navigate('signin')}
          className="w-full py-4 rounded-lg font-semibold text-gray-700 text-base"
          style={{background:'#d8cff0'}}
        >
          Already Registered? Login
        </button>
      </div>
    </div>
  );
}

function SigninScreen({ navigate }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');

  return (
    <div className="card flex flex-col p-8" style={{minHeight:'580px'}}>
      <div className="mt-6">
        <h1 className="text-3xl font-bold text-gray-900 mb-2 leading-tight">Signin to your<br/>PopX account</h1>
        <p className="text-gray-500 text-sm mb-8 leading-relaxed">Lorem ipsum dolor sit amet,<br/>consectetur adipiscing elit,</p>

        <div className="mb-5">
          <label className="block text-xs font-semibold mb-1" style={{color:'#6c35de'}}>Email Address</label>
          <input
            type="email"
            placeholder="Enter email address"
            value={email}
            onChange={e => setEmail(e.target.value)}
            className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-700 outline-none focus:border-purple-500"
            style={{background:'#f5f5f5'}}
          />
        </div>

        <div className="mb-8">
          <label className="block text-xs font-semibold mb-1" style={{color:'#6c35de'}}>Password</label>
          <input
            type="password"
            placeholder="Enter password"
            value={password}
            onChange={e => setPassword(e.target.value)}
            className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-700 outline-none focus:border-purple-500"
            style={{background:'#f5f5f5'}}
          />
        </div>

        <button
          onClick={() => navigate('account-settings')}
          className="w-full py-4 rounded-lg text-white font-semibold text-base"
          style={{background:'#9e9e9e'}}
        >
          Login
        </button>
      </div>
    </div>
  );
}

function CreateAccountScreen({ navigate }) {
  const [agency, setAgency] = useState('no');

  return (
    <div className="card flex flex-col p-8" style={{minHeight:'580px'}}>
      <h1 className="text-3xl font-bold text-gray-900 mb-6 leading-tight mt-4">Create your PopX<br/>account</h1>

      {[
        { label: 'Full Name*', placeholder: 'Enter full name', type: 'text' },
        { label: 'Phone number*', placeholder: 'Enter phone number', type: 'tel' },
        { label: 'Email address*', placeholder: 'Enter email address', type: 'email' },
        { label: 'Password*', placeholder: 'Enter password', type: 'password' },
        { label: 'Company name', placeholder: 'Enter company name', type: 'text' },
      ].map(({ label, placeholder, type }) => (
        <div className="mb-4" key={label}>
          <label className="block text-xs font-semibold mb-1" style={{color:'#6c35de'}}>{label}</label>
          <input
            type={type}
            placeholder={placeholder}
            className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-700 outline-none focus:border-purple-500"
            style={{background:'#f5f5f5'}}
          />
        </div>
      ))}

      <div className="mb-6">
        <p className="text-sm font-semibold text-gray-800 mb-2">Are you an Agency?*</p>
        <div className="flex gap-6">
          <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
            <input type="radio" name="agency" value="yes" checked={agency==='yes'} onChange={()=>setAgency('yes')} />
            Yes
          </label>
          <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
            <input type="radio" name="agency" value="no" checked={agency==='no'} onChange={()=>setAgency('no')} />
            No
          </label>
        </div>
      </div>

      <button
        onClick={() => navigate('account-settings')}
        className="w-full py-4 rounded-lg text-white font-semibold text-base"
        style={{background:'#6c35de'}}
      >
        Create Account
      </button>
    </div>
  );
}

function AccountSettingsScreen() {
  return (
    <div className="card flex flex-col" style={{minHeight:'580px'}}>
      <div className="p-6 border-b border-dashed border-gray-300">
        <h2 className="text-lg font-semibold text-gray-800 mb-5">Account Settings</h2>
        <div className="flex items-center gap-4 mb-5">
          <div className="relative">
            <img
              src="https://i.pravatar.cc/64?img=47"
              alt="Profile"
              className="w-16 h-16 rounded-full object-cover"
            />
            <div
              className="absolute bottom-0 right-0 w-5 h-5 rounded-full flex items-center justify-center"
              style={{background:'#6c35de'}}
            >
              <svg width="10" height="10" viewBox="0 0 24 24" fill="white">
                <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/>
                <path d="M9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
              </svg>
            </div>
          </div>
          <div>
            <p className="font-bold text-gray-900 text-base">Marry Doe</p>
            <p className="text-gray-500 text-sm">Marry@Gmail.Com</p>
          </div>
        </div>
        <p className="text-sm text-gray-700 leading-relaxed">
          Lorem Ipsum Dolor Sit Amet, Consetetur Sadipscing Elitr, Sed Diam Nonumy Eirmod Tempor Invidunt Ut Labore Et Dolore Magna Aliquyam Erat, Sed Diam
        </p>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('welcome');

  return (
    <div style={{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'#e0dede', padding:'20px'}}>
      {screen === 'welcome' && <WelcomeScreen navigate={setScreen} />}
      {screen === 'signin' && <SigninScreen navigate={setScreen} />}
      {screen === 'create-account' && <CreateAccountScreen navigate={setScreen} />}
      {screen === 'account-settings' && <AccountSettingsScreen navigate={setScreen} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
